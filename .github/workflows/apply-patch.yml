name: Apply Patch to Sovereign Fields

on:
  push:
    paths:
      - 'patches/*.patch'

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find latest patch
        id: find-patch
        run: |
          PATCH=$(ls patches/*.patch | sort -V | tail -1)
          echo "patch=$PATCH" >> $GITHUB_OUTPUT
          echo "Found patch: $PATCH"

      - name: Apply patch to index.html
        run: |
          python3 patches/apply_patch.py "${{ steps.find-patch.outputs.patch }}" index.html

      - name: Commit and push updated index.html
        run: |
          git config user.name "Sovereign Fields Bot"
          git config user.email "actions@github.com"
          PATCH="${{ steps.find-patch.outputs.patch }}"
          VERSION=$(basename "$PATCH" .patch)
          git add index.html
          git commit -m "Apply $VERSION" || echo "Nothing to commit"
          git push
